version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - RAG_API_URL=http://localhost:8000
      - PYTHONPATH=/app
    volumes:
      - ./data:/app/data
      - ./storage:/app/storage
    command: uvicorn src.interfaces.api:app --host 0.0.0.0 --port 8000
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag_frontend
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - RAG_API_URL=http://backend:8000
      - PYTHONPATH=/app
    depends_on:
      - backend
    command: streamlit run src/interfaces/ui.py --server.port 8501 --server.address 0.0.0.0
    restart: always